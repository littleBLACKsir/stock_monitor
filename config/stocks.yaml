rules:
  hard_filters:
    min_listing_days: 120
    exclude_st: true
    exclude_suspended: true
    max_missing_ratio: 0.10
    min_avg_amount_20d: 80000000
    min_avg_turnover_20d: 0.005
    price_range:
      min: 3.0
      max: 1500.0
    max_realized_volatility_20d: 0.95
    max_single_day_limit_move_hint: 0.095

  soft_scoring:
    weights:
      theme_relevance: 0.30
      liquidity_quality: 0.25
      market_performance: 0.20
      drawdown_quality: 0.10
      volatility_quality: 0.10
      concentration_penalty: 0.05
    promote_threshold: 0.65
    retain_threshold: 0.45

  concentration:
    max_candidates_per_subsector: 6
    max_total_recommended_per_sector: 5

  review_framework:
    holding_periods: [1, 2, 5, 10, 20]
    observation_actions: ["观察", "满足条件可小仓试错"]
    comments:
      - "候选池建议仅供纳入/剔除参考，不自动替换核心池。"
      - "若 ST/停牌/退市状态无法校验，输出时必须显式标记未校验。"
