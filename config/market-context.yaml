# 市场环境与宏观过滤配置

benchmarks:
  broad_market:
    - code: "000300"
      name: "沪深300"
      exchange: "SH_INDEX"
      asset_type: "index"
    - code: "399006"
      name: "创业板指"
      exchange: "SZ_INDEX"
      asset_type: "index"

  theme:
    - code: "159381"
      name: "人工智能ETF"
      exchange: "SZ"
      asset_type: "etf"
    - code: "159819"
      name: "人工智能ETF-宽口径"
      exchange: "SZ"
      asset_type: "etf"

regime_detection:
  short_ma: 5
  long_ma: 20
  return_lookback: 20
  risk_on_return_threshold: 0.05
  risk_off_return_threshold: -0.08
  crisis_return_threshold: -0.15

macro_overrides:
  enabled: false
  regime: "neutral"
  note: ""

macro_filter:
  apply_score_multiplier: true
  risk_off_blocks_new_positions: false
  crisis_blocks_new_positions: true
  resonance_proxy: "159381"

notes:
  - "宏观环境只做开关或降权，不直接替代个股信号。"
  - "板块共振默认使用同赛道平均指标与主题 ETF 共同确认。"
