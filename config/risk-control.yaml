# 风控配置

position_management:
  total_ai_limit: 0.50
  max_sector_limit: 0.25

  role_limits:
    leader:
      max: 0.10
      recommended: 0.08
    sub_leader:
      max: 0.07
      recommended: 0.05
    high_risk:
      max: 0.05
      recommended: 0.03
    etf:
      max: 0.12
      recommended: 0.10

  market_regime_multipliers:
    risk_on: 1.00
    neutral: 1.00
    risk_off: 0.75
    crisis: 0.50

  liquidity_adjustment:
    amount_percentile_breaks: [0.20, 0.50, 0.80]
    multipliers: [0.60, 0.85, 1.00, 1.10]

stop_loss:
  primary_mode: "atr"
  fixed_pct: 0.15
  atr:
    period: 14
    multiplier: 2.5
    floor_pct: 0.08
    cap_pct: 0.18
    role_multipliers:
      leader: 2.5
      sub_leader: 2.0
      high_risk: 3.0
      etf: 2.0
    note: "高波动股(high_risk)用3倍ATR，龙头股(leader)用2.5倍，稳健股用2倍"

take_profit:
  primary: 0.20
  secondary: 0.35
  trailing_note: "更强调用确认信号与相对强弱做跟踪，不强制脚本给卖点。"

entry_management:
  batches: [0.40, 0.35, 0.25]

  batch_1:
    require_confirmation_pass: true
    min_oversold_score: 50
    action_if_failed: "观察"

  batch_2:
    require_close_above_ma5: true
    require_not_break_recent_low: true
    recent_low_lookback: 5

  batch_3:
    require_close_above_ma10: true
    require_macd_improvement: true

pre_trade_checklist:
  must_pass:
    - "universe_hard_filters"
    - "data_quality_ok"
    - "confirmation_pass"
    - "liquidity_ok"
    - "no_earnings_blackout"
  allow_watch_if_failed:
    - "confirmation_pass"
    - "no_earnings_blackout"

action_mapping:
  small_trial:
    min_oversold_score: 50
    require_confirmation_pass: true
    max_blocking_risk_flags: 2
  observe:
    min_oversold_score: 35
  reject_on_flags:
    - "suspension_risk"
    - "earnings_blackout"

reporting:
  checklist_title: "下单前检查清单"

a_share_rules:
  t_plus_1:
    enabled: true
    note: "A股T+1交易规则：当日买入的股票次日才能卖出，需预留机动资金"
    suggested_cash_reserve: 0.30
  
  price_limit:
    main_board:
      up_limit: 0.10
      down_limit: -0.10
      note: "主板涨跌停限制10%"
    gem_star:
      up_limit: 0.20
      down_limit: -0.20
      note: "创业板/科创板涨跌停限制20%"
  
  one_word_board_warning:
    enabled: true
    description: "一字板（涨停/跌停开盘且全天无波动）无法买入或卖出"
    action: "观望"
    note: "一字板股票流动性极差，不建议追涨或抄底"
  
  suspension_handling:
    action: "reject"
    note: "停牌股票无法交易，需等待复牌"
