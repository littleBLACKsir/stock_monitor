# 风控配置

position_management:
  total_ai_limit: 0.50
  max_sector_limit: 0.25

  role_limits:
    leader:
      max: 0.10
      recommended: 0.08
    sub_leader:
      max: 0.07
      recommended: 0.05
    high_risk:
      max: 0.05
      recommended: 0.03
    etf:
      max: 0.12
      recommended: 0.10

  market_regime_multipliers:
    risk_on: 1.00
    neutral: 1.00
    risk_off: 0.75
    crisis: 0.50

  liquidity_adjustment:
    amount_percentile_breaks: [0.20, 0.50, 0.80]
    multipliers: [0.60, 0.85, 1.00, 1.10]

stop_loss:
  primary_mode: "atr"
  fixed_pct: 0.15
  atr:
    period: 14
    multiplier: 2.5
    floor_pct: 0.08
    cap_pct: 0.18

take_profit:
  primary: 0.20
  secondary: 0.35
  trailing_note: "更强调用确认信号与相对强弱做跟踪，不强制脚本给卖点。"

entry_management:
  batches: [0.40, 0.35, 0.25]

  batch_1:
    require_confirmation_pass: true
    min_oversold_score: 50
    action_if_failed: "观察"

  batch_2:
    require_close_above_ma5: true
    require_not_break_recent_low: true
    recent_low_lookback: 5

  batch_3:
    require_close_above_ma10: true
    require_macd_improvement: true

pre_trade_checklist:
  must_pass:
    - "universe_hard_filters"
    - "data_quality_ok"
    - "confirmation_pass"
    - "liquidity_ok"
    - "no_earnings_blackout"
  allow_watch_if_failed:
    - "confirmation_pass"
    - "no_earnings_blackout"

action_mapping:
  small_trial:
    min_oversold_score: 50
    require_confirmation_pass: true
    max_blocking_risk_flags: 2
  observe:
    min_oversold_score: 35
  reject_on_flags:
    - "suspension_risk"
    - "earnings_blackout"

reporting:
  checklist_title: "下单前检查清单"
