    event: "美联储议息会议"
    type: "macro"
    impact: "high"
    description: "可能影响全球科技股估值"
    action: "会议前降低仓位，关注结果"
    
  - date: "2026-04-25"
    event: "寒武纪一季报"
    type: "earnings"
    impact: "high"
    related_stocks: ["688256"]
    description: "验证AI芯片业绩拐点"
    action: "财报前观望"
    
  - date: "2026-04-28"
    event: "中际旭创一季报"
    type: "earnings"
    impact: "high"
    related_stocks: ["300308"]
    description: "验证光模块龙头业绩"
    action: "关注业绩指引"
    
  - date: "2026-05-15"
    event: "GTC大会（英伟达）"
    type: "industry"
    impact: "medium"
    description: "英伟达新产品发布"
    action: "关注AI算力产业链催化"

# ============================================================
# 风险事件类型说明
# ============================================================
event_types:
  macro:
    name: "宏观经济"
    impact_level: "high"
    description: "影响整体市场情绪和估值"
    examples: ["美联储议息", "通胀数据", "PMI数据"]
    
  policy:
    name: "政策法规"
    impact_level: "high"
    description: "影响特定行业或公司"
    examples: ["芯片出口管制", "AI监管政策", "国产替代政策"]
    
  earnings:
    name: "财报业绩"
    impact_level: "medium"
    description: "影响单只股票"
    examples: ["季报发布", "业绩预告", "分红方案"]
    
  industry:
    name: "行业事件"
    impact_level: "medium"
    description: "影响板块情绪"
    examples: ["行业大会", "技术突破", "产品发布"]
    
  company:
    name: "公司事件"
    impact_level: "low"
    description: "影响单只股票"
    examples: ["高管变动", "股权激励", "定增"]

# ============================================================
# 事件应对策略
# ============================================================
response_strategies:
  high_impact:
    before: "提前3-5个交易日降低仓位或观望"
    during: "不操作，等待事件落地"
    after: "根据结果决定是否重新建仓"
    
  medium_impact:
    before: "正常操作，但降低仓位上限"
    during: "关注事件进展"
    after: "评估影响后决定操作"
    
  low_impact:
    before: "正常操作"
    during: "正常操作"
    after: "正常操作"

# ============================================================
# 事件提醒设置
# ============================================================
reminders:
  - trigger: "事件前5个交易日"
    action: "在分析报告中提醒"
  - trigger: "事件前1个交易日"
    action: "检查持仓是否需要调整"
  - trigger: "事件当天"
    action: "不新建仓位"
