# 重大事件日历
# 更新日期：{YYYY-MM-DD}
# 说明：记录可能影响AI算力产业链的重大事件，用于风险规避和机会把握

# ============================================================
# 定期事件（每年固定时间）
# ============================================================
regular_events:
  # 财报季
  earnings_season:
    - period: "Q1财报"
      start_date: "04-01"
      end_date: "04-30"
      impact: "high"
      description: "一季报披露期，业绩不确定性高"
      action: "财报发布前5个交易日避免新建仓位"
      
    - period: "Q2财报"
      start_date: "07-01"
      end_date: "08-31"
      impact: "high"
      description: "半年报披露期"
      action: "关注业绩超预期标的"
      
    - period: "Q3财报"
      start_date: "10-01"
      end_date: "10-31"
      impact: "medium"
      description: "三季报披露期"
      action: "验证全年业绩预期"
      
    - period: "Q4财报"
      start_date: "01-01"
      end_date: "04-30"
      impact: "high"
      description: "年报披露期，分红预期"
      action: "关注高分红标的"
  
  # 重要会议
  conferences:
    - name: "全国两会"
      period: "03-03 至 03-15"
      impact: "medium"
      focus: "科技政策、芯片国产化政策"
      action: "关注政策相关标的"
      
    - name: "中央经济工作会议"
      period: "12月中旬"
      impact: "high"
      focus: "明年经济政策定调"
      action: "关注政策导向"
  
  # 行业大会
  industry_events:
    - name: "世界人工智能大会(WAIC)"
      period: "07月"
      impact: "medium"
      focus: "AI技术突破、新产品发布"
      action: "关注相关标的短期催化"
      
    - name: "OFC光网络与通信会议"
      period: "03月"
      impact: "medium"
      focus: "光模块新技术、CPO进展"
      action: "关注光模块赛道"

# ============================================================
# 2026年特定事件
# ============================================================
events_2026:
