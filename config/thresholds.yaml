# 指标、阈值与数据口径统一配置
# 第二轮收敛原则：
# 1. 默认超跌总分仅使用 4 个主因子
# 2. KDJ 与 volume_ratio 不再进入默认总分
# 3. 确认项收敛为 4 个，volume_confirmation 为可选项

data_standard:
  frequency: "daily"
  adjust: "qfq"
  price_field: "close"
  benchmark_price_field: "close"
  min_history_days: 260
  min_periods:
    rsi: 14
    bollinger: 20
    ma: 20
    atr: 14
    drawdown: 60

data_sources:
  primary:
    name: "eastmoney"
    type: "public_api"
    note: "优先使用东方财富公开 K 线接口。"
  fallback:
    - "local_cache"
    - "synthetic_sample"
  validation_notes:
    - "ST、停牌、退市风险、换手率在无证券主数据服务时可能仅能部分校验。"

oversold_scoring:
  default_components: ["rsi", "bollinger", "ma_deviation_atr", "drawdown_position"]

  score_bands:
    watch: 35
    candidate: 50
    strong_candidate: 70

  factors:
    rsi:
      weight: 0.30
      center: 35
      scale: 10
      direction: "lower_better"
      explanation: "RSI 越低，越偏向均值回归观察。"

    bollinger:
      weight: 0.25
      center: 0.00
      scale: 0.03
      direction: "lower_better"
      explanation: "收盘越靠近或跌破下轨，越接近短期极端位置。"

    ma_deviation_atr:
      weight: 0.25
      center: -1.50
      scale: 1.00
      direction: "lower_better"
      explanation: "相对 MA20 的 ATR 标准化偏离越低，越偏超跌。"

    drawdown_position:
      weight: 0.20
      center: -0.18
      scale: 0.10
      direction: "lower_better"
      explanation: "距离近 60 日高点回撤越深，越接近位置型超跌。"

  optional_components:
    kdj:
      enabled: false
      deprecated: true
      note: "默认不纳入总分，避免与 RSI 强相关而重复计分。"
    volume_ratio:
      enabled: false
      deprecated: true
      note: "默认不纳入总分，改作确认项使用。"

confirmations:
  minimum_pass_count: 2

  trend_reversal:
    ma_period: 5
    ma_slope_lookback: 3
    macd_histogram_rising_days: 2
    explanation: "MACD 改善与短均线支撑合并判断，减少重复表达。"

  price_reclaim:
    low_lookback: 5
    reclaim_ratio: 0.01
    lower_shadow_ratio_min: 0.40
    body_ratio_max: 0.35
    explanation: "优先识别 N 日低点后收回或长下影止跌，不扩展更多形态。"

  volume_confirmation:
    enabled: false
    volume_ratio_threshold: 1.20
    min_positive_return: 0.003
    explanation: "默认仅作可选确认项，不参与总分。"

  sector_resonance:
    min_sector_avg_oversold_score: 40
    min_sector_avg_relative_strength_20d: -0.02
    explanation: "作为辅助确认，不单独主导交易结论。"

relative_strength:
  long_lookback: 20
  short_lookback: 5
  ratio_ma_period: 10
  positive_threshold: 0.02
  negative_threshold: -0.02

market_regime:
  oversold_score_multiplier:
    risk_on: 1.02
    neutral: 1.00
    risk_off: 0.90
    crisis: 0.80

review:
  holding_periods: [1, 2, 5, 10, 20]
  hit_threshold: 0.03
  max_drawdown_lookback: 20
