# 超跌/超涨判断阈值配置
# 更新日期：2026-04-08

# RSI指标阈值
rsi:
  strong_oversold: 25
  oversold: 30
  weak_oversold: 40
  weak_overbought: 60
  overbought: 70
  strong_overbought: 80

# KDJ指标阈值
kdj:
  strong_oversold: 15
  oversold: 20
  weak_oversold: 30
  weak_overbought: 70
  overbought: 80
  strong_overbought: 85

# 布林带位置
bollinger:
  lower_band_oversold: -2
  lower_band_weak_oversold: -1
  upper_band_weak_overbought: 1
  upper_band_overbought: 2

# 均线偏离度
ma_deviation:
  strong_oversold: -10
  oversold: -5
  weak_oversold: -3
  weak_overbought: 3
  overbought: 5
  strong_overbought: 10

# 超跌评分权重
scoring_weights:
  rsi: 30
  kdj: 25
  bollinger: 20
  ma_deviation: 15
  volume_ratio: 10

# 评分等级
score_levels:
  strong_buy:
    min: 70
    description: "强超跌，建议重点关注"
  buy:
    min: 50
    description: "超跌，可以考虑建仓"
  watch:
    min: 40
    description: "弱超跌，观望"
  hold:
    min: 20
    description: "正常区间，持有"
  sell:
    min: 0
    description: "超涨，考虑减仓"

# 量比阈值
volume_ratio:
  high_volume: 2.0
  normal_volume: 1.0
  low_volume: 0.5

# ============================================================
# 数据源规范（确保各AI使用一致数据）
# ============================================================
data_sources:
  # 推荐数据源（优先级从高到低）
  primary:
    - name: "东方财富"
      url: "https://quote.eastmoney.com/"
      indicators: ["RSI", "KDJ", "MACD", "布林带", "均线"]
      reliability: "high"
      note: "数据最全面，技术指标可直接查看"
      
    - name: "同花顺"
      url: "https://stockpage.10jqka.com/"
      indicators: ["RSI", "KDJ", "MACD", "布林带", "均线"]
      reliability: "high"
      note: "数据准确，技术分析功能强"
  
  # 备用数据源
  secondary:
    - name: "新浪财经"
      url: "https://finance.sina.com.cn/realstock/company/"
      indicators: ["基础行情", "成交量"]
      reliability: "medium"
      note: "备用，数据更新较快"
      
    - name: "雪球"
      url: "https://xueqiu.com/"
      indicators: ["基础行情", "资金流向"]
      reliability: "medium"
      note: "社区讨论丰富，可参考观点"

# ============================================================
# 指标计算标准
# ============================================================
indicator_standards:
  rsi:
    period: 14                   # RSI周期
    formula: "RSI = 100 - 100/(1+RS), RS = 平均上涨幅度/平均下跌幅度"
    
  kdj:
    k_period: 9                  # K值周期
    d_period: 3                  # D值周期
    j_period: 3                  # J值周期
    formula: |
      RSV = (收盘价-N日最低价)/(N日最高价-N日最低价)×100
      K = 2/3×前一日K值 + 1/3×当日RSV
      D = 2/3×前一日D值 + 1/3×当日K值
      J = 3×K - 2×D
      
  bollinger:
    period: 20                   # 布林带周期
    std_dev: 2                   # 标准差倍数
    formula: |
      中轨 = 20日均线
      上轨 = 中轨 + 2×标准差
      下轨 = 中轨 - 2×标准差
      
  ma:
    periods: [5, 10, 20, 60]     # 常用均线周期
    formula: "简单移动平均"

# ============================================================
# 数据更新频率
# ============================================================
update_frequency:
  market_data: "实时"            # 行情数据
  technical_indicators: "每日收盘后"  # 技术指标
  fundamental_data: "季度"       # 基本面数据
  stock_pool: "季度审核"         # 股票池

# ============================================================
# 数据一致性检查
# ============================================================
consistency_check:
  - "各AI应使用相同数据源获取技术指标"
  - "如数据源差异导致指标不一致，以东方财富为准"
  - "发现数据异常时，应交叉验证多个数据源"
